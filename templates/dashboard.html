<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopStream – Live Analytics Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.2rem;
      color: #58a6ff;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: #3fb950;
    }

    .live-badge .dot {
      width: 8px;
      height: 8px;
      background: #3fb950;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    header nav a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.85rem;
      margin-left: 16px;
    }

    .kpi-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 24px;
    }

    .kpi {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 18px 24px;
      flex: 1;
      min-width: 160px;
    }

    .kpi .label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kpi .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 6px;
      color: #58a6ff;
    }

    .green { color: #3fb950; }
    .yellow { color: #e3b341; }
    .red { color: #f85149; }

    .panels {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 0 24px 24px;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
      flex: 1;
      min-width: 280px;
    }

    .panel h3 {
      font-size: 0.85rem;
      color: #8b949e;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .bar-label { width: 120px; }
    .bar-track {
      flex: 1;
      background: #21262d;
      height: 18px;
      border-radius: 4px;
    }

    .bar-fill {
      height: 100%;
      background: #1f6feb;
      border-radius: 4px;
    }

    .bar-count { width: 30px; text-align: right; }

    #feed {
      font-family: monospace;
      max-height: 320px;
      overflow-y: auto;
    }

    .feed-row {
      display: flex;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #21262d;
    }

    .feed-ts { width: 90px; color: #484f58; }
    .feed-type { width: 110px; }
    .feed-page { flex: 1; color: #8b949e; }
    .feed-user { width: 60px; color: #484f58; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.78rem;
      border-top: 1px solid #21262d;
      color: #484f58;
    }
  </style>
</head>

<body>

<header>
  <h1>ShopStream – Live Analytics</h1>
  <div style="display:flex; gap:16px;">
    <div class="live-badge" aria-live="polite">
      <div class="dot"></div> LIVE
    </div>
    <nav>
      <a href="/">← Back to Store</a>
    </nav>
  </div>
</header>

<div class="kpi-row">
  <div class="kpi"><div class="label">Total Events</div><div class="value" id="kpi-total">–</div></div>
  <div class="kpi"><div class="label">Page Views</div><div class="value green" id="kpi-views">–</div></div>
  <div class="kpi"><div class="label">Add to Cart</div><div class="value yellow" id="kpi-cart">–</div></div>
  <div class="kpi"><div class="label">Purchases</div><div class="value red" id="kpi-purchase">–</div></div>
</div>

<div class="panels">

  <div class="panel">
    <h3>Device Type Activity</h3>
    <div id="device-chart"><p>Waiting...</p></div>
  </div>

  <div class="panel">
    <h3>Traffic Spikes</h3>
    <div id="spike-alert"><p>No spikes</p></div>
  </div>

  <div class="panel">
    <h3>Events by Type</h3>
    <div id="bar-chart"><p>Waiting...</p></div>
  </div>

  <div class="panel">
    <h3>Live Event Feed</h3>
    <div id="feed"><p>Waiting...</p></div>
  </div>

</div>

<footer>
  Polling every 2 seconds | Azure Event Hubs
</footer>

<script>
const POLL_INTERVAL_MS = 2000;

function renderKPIs(data) {
  document.getElementById("kpi-total").textContent = data.total ?? 0;
  document.getElementById("kpi-views").textContent = data.summary?.page_view ?? 0;
  document.getElementById("kpi-cart").textContent = data.summary?.add_to_cart ?? 0;
  document.getElementById("kpi-purchase").textContent = data.summary?.purchase ?? 0;
}

function renderBarChart(summary) {
  const container = document.getElementById("bar-chart");

  if (!summary || Object.keys(summary).length === 0) {
    container.innerHTML = "<p>No data yet</p>";
    return;
  }

  const maxVal = Math.max(...Object.values(summary), 1);
  container.innerHTML = "";

  Object.entries(summary).forEach(([type, count]) => {
    const pct = (count / maxVal * 100);

    container.innerHTML += `
      <div class="bar-row">
        <div class="bar-label">${type}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="bar-count">${count}</div>
      </div>
    `;
  });
}

function renderFeed(events) {
  const feed = document.getElementById("feed");

  if (!events || events.length === 0) {
    feed.innerHTML = "<p>No events yet</p>";
    return;
  }

  feed.innerHTML = "";

  [...events].reverse().forEach(e => {
    feed.innerHTML += `
      <div class="feed-row">
        <span class="feed-ts">${e.timestamp?.slice(11,19) || "-"}</span>
        <span class="feed-type">${e.event_type}</span>
        <span class="feed-page">${e.page}</span>
        <span class="feed-user">${e.user_id}</span>
      </div>
    `;
  });
}

function renderDeviceChart(data) {
  const container = document.getElementById("device-chart");

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  const summary = {};
  data.forEach(d => {
    summary[d.deviceType] = (summary[d.deviceType] || 0) + d.event_count;
  });

  const maxVal = Math.max(...Object.values(summary), 1);
  container.innerHTML = "";

  Object.entries(summary).forEach(([type, count]) => {
    const pct = (count / maxVal * 100);

    container.innerHTML += `
      <div class="bar-row">
        <div class="bar-label">${type}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="bar-count">${count}</div>
      </div>
    `;
  });
}

function renderSpikes(data) {
  const container = document.getElementById("spike-alert");

  if (!data || data.length === 0) {
    container.innerHTML = "No spikes detected";
    return;
  }

  const latest = data[data.length - 1];

  container.innerHTML = `
    <div style="color:#f85149; font-weight:bold;">⚠️ Traffic Spike!</div>
    <div>${latest.total_events} events</div>
  `;
}

function fetchAndRender() {
  fetch("/api/events?limit=50")
    .then(res => res.json())
    .then(data => {
      renderKPIs(data);
      renderBarChart(data.summary);
      renderFeed(data.events);
    })
    .catch(err => console.error("Events error:", err));

  fetch("/api/devices")
    .then(res => res.json())
    .then(data => renderDeviceChart(data))
    .catch(err => console.error("Device error:", err));

  fetch("/api/spikes")
    .then(res => res.json())
    .then(data => renderSpikes(data))
    .catch(err => console.error("Spike error:", err));
}

// ✅ start polling
fetchAndRender();
setInterval(fetchAndRender, POLL_INTERVAL_MS);
</script>

</body>
</html>
